<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Carta 3D</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        body {
            margin: 0;
            padding: 0;

            background:
                linear-gradient(
                    135deg,
                    #1a0033,
                    #4a148c,
                    #3f51b5
                );

            min-height: 100vh;

            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            perspective: 1500px;
        }

        .card-container {

            width: 85vw;
            aspect-ratio: 300 / 420;

            max-width: 320px;

            position: relative;

            perspective: 1500px;
        }

        .card {

            width: 100%;
            height: 100%;

            position: relative;

            transform-style: preserve-3d;

            transition:
                transform 0.8s cubic-bezier(.4,2,.3,1);

            cursor: grab;

            box-shadow:
                0 25px 50px rgba(0,0,0,0.45);

        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {

            position: absolute;

            width: 100%;
            height: 100%;

            border-radius: 18px;

            overflow: hidden;

            backface-visibility: hidden;

            background: #222;

        }

        .face-background {

            width: 100%;
            height: 100%;

            object-fit: cover;

            display: block;
        }

        .front {
            z-index: 2;
        }

        .back {

            transform: rotateY(180deg);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GROSOR */

        .card::before,
        .card::after {

            content: "";

            position: absolute;

            width: 100%;
            height: 100%;

            border-radius: 18px;

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,255,255,0.12),
                    rgba(0,0,0,0.25)
                );

            transform: translateZ(-6px);

            z-index: -1;
        }

        /* BOTONES */

        .link-buttons {

            position: absolute;

            z-index: 5;

            width: 85%;

            display: flex;
            flex-direction: column;

            gap: 15px;
        }

        .link-button {

            display: flex;
            align-items: center;
            justify-content: center;

            gap: 12px;

            padding: 14px;

            border-radius: 30px;

            background:
                rgba(20,20,20,0.72);

            color: white;

            text-decoration: none;

            font-family: Arial;

            backdrop-filter: blur(5px);

            transition: 0.25s;
        }

        .link-button:hover {

            transform: scale(1.04);

            background:
                rgba(40,40,40,0.88);
        }

        .flip-button {

            position: fixed;

            bottom: 25px;
            right: 25px;

            width: 55px;
            height: 55px;

            border: none;

            border-radius: 50%;

            background: white;

            cursor: pointer;

            z-index: 100;

            box-shadow:
                0 10px 20px rgba(0,0,0,0.35);
        }

    </style>

</head>

<body>

    <div class="card-container">

        <div class="card"
             id="interactiveCard">

            <!-- FRENTE -->

            <div class="card-face front">

                <img
                    src="carta_frente.png.jpg.png"
                    alt="Frente"
                    class="face-background">

            </div>

            <!-- DORSO -->

            <div class="card-face back">

                <img
                    src="carta_dorso.png.png"
                    alt="Dorso"
                    class="face-background">

                <div class="link-buttons">

                    <a href="https://www.instagram.com/jtenshi_/"
                       target="_blank"
                       class="link-button">

                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>

                    </a>

                    <a href="https://youtube.com/@j-tenshimus1c?si=3MX3w9MmR-XNXWmx"
                       target="_blank"
                       class="link-button">

                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>

                    </a>

                    <a href="https://youtu.be/0_QHL7cDYno?si=-gfNkI5mHWKMHbKW"
                       target="_blank"
                       class="link-button">

                        <i class="fas fa-play"></i>
                        <span>Último Video</span>

                    </a>

                </div>

            </div>

        </div>

    </div>

    <button class="flip-button"
            id="flipButton">

        <i class="fas fa-sync-alt"></i>

    </button>

    <script>

        const card =
            document.getElementById(
                "interactiveCard"
            );

        const flipButton =
            document.getElementById(
                "flipButton"
            );

        flipButton.addEventListener(
            "click",
            () => {

                card.classList.toggle(
                    "flipped"
                );

            }
        );

    </script>

</body>
</html>
